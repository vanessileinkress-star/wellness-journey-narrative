name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (SPA for GitHub Pages)
        run: bun run build
        env:
          # Signals vite.config.ts to disable Nitro so the build produces a
          # pure static SPA (no Cloudflare Worker output, no SSR runtime).
          GITHUB_PAGES: "1"

      - name: Prepare Pages output
        run: |
          set -e
          OUT_DIR="dist/client"
          if [ ! -f "$OUT_DIR/index.html" ]; then
            echo "Expected $OUT_DIR/index.html, but it is missing." >&2
            ls -la dist || true
            exit 1
          fi
          echo "Publishing $OUT_DIR"
          # SPA fallback: GitHub Pages serves 404.html for unknown paths,
          # which lets client-side routing take over on deep links / reloads.
          cp "$OUT_DIR/index.html" "$OUT_DIR/404.html"
          # Disable Jekyll so files/folders beginning with _ are served.
          touch "$OUT_DIR/.nojekyll"
          echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
